<html>
	<head>
		<style type="text/css">
			.chargement{
				display: flex;
				justify-content:center;
				align-items:center;
				animation: rotation 1.4s linear infinite;
				margin:auto;
			}
			@keyframes rotation{
				0% {transform: rotate(0deg);}
				50% {transform: rotate(180deg);}
				100% {transform: rotate(360deg);}
			}
		</style>
	</head>
	<body>
		<img class=chargement src=canvas.png>
	</body>
</html>
